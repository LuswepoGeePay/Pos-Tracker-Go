version: "3.9"

services:
  api:
    build: .
    ports:
      - "8050:8050"
    env_file:
      - .env
    depends_on:
      - mysql

  mysql:
    image: mariadb:11
    environment:
      MYSQL_DATABASE: goodfellow
      MYSQL_ALLOW_EMPTY_PASSWORD: yes
    ports:
      - "3306:3306"
    volumes:
      - ./mariadb_data:/var/lib/mysql   # fresh folder


volumes:
  mysql_data:
